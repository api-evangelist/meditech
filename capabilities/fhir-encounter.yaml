naftiko: 1.0.0-alpha2
info:
  label: Meditech Expanse FHIR R4 API — Encounter
  description: 'Meditech Expanse FHIR R4 API — Encounter. 1 operations. Lead operation: Get patient encounters. Self-contained
    Naftiko capability covering one Meditech business surface.'
  tags:
  - Meditech
  - Encounter
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    MEDITECH_API_KEY: MEDITECH_API_KEY
capability:
  consumes:
  - type: http
    namespace: fhir-encounter
    baseUri: https://{facility}.meditech.com/fhir/r4
    description: Meditech Expanse FHIR R4 API — Encounter business capability. Self-contained, no shared references.
    resources:
    - name: Patient-id-Encounter
      path: /Patient/{id}/Encounter
      operations:
      - name: getpatientencounters
        method: GET
        description: Get patient encounters
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: string
          required: true
        - name: status
          in: query
          type: string
        - name: date
          in: query
          type: string
        - name: _count
          in: query
          type: integer
    authentication:
      type: bearer
      token: '{{env.MEDITECH_API_KEY}}'
  exposes:
  - type: rest
    namespace: fhir-encounter-rest
    port: 8080
    description: REST adapter for Meditech Expanse FHIR R4 API — Encounter. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/patient/{id}/encounter
      name: patient-id-encounter
      description: REST surface for Patient-id-Encounter.
      operations:
      - method: GET
        name: getpatientencounters
        description: Get patient encounters
        call: fhir-encounter.getpatientencounters
        with:
          id: rest.id
          status: rest.status
          date: rest.date
          _count: rest._count
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: fhir-encounter-mcp
    port: 9090
    transport: http
    description: MCP adapter for Meditech Expanse FHIR R4 API — Encounter. One tool per consumed operation, routed inline
      through this capability's consumes block.
    tools:
    - name: get-patient-encounters
      description: Get patient encounters
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: fhir-encounter.getpatientencounters
      with:
        id: tools.id
        status: tools.status
        date: tools.date
        _count: tools._count
      outputParameters:
      - type: object
        mapping: $.
