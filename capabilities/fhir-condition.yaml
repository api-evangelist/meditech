naftiko: 1.0.0-alpha2
info:
  label: Meditech Expanse FHIR R4 API — Condition
  description: 'Meditech Expanse FHIR R4 API — Condition. 1 operations. Lead operation: Get patient conditions (problem list,
    diagnoses). Self-contained Naftiko capability covering one Meditech business surface.'
  tags:
  - Meditech
  - Condition
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    MEDITECH_API_KEY: MEDITECH_API_KEY
capability:
  consumes:
  - type: http
    namespace: fhir-condition
    baseUri: https://{facility}.meditech.com/fhir/r4
    description: Meditech Expanse FHIR R4 API — Condition business capability. Self-contained, no shared references.
    resources:
    - name: Patient-id-Condition
      path: /Patient/{id}/Condition
      operations:
      - name: getpatientconditions
        method: GET
        description: Get patient conditions (problem list, diagnoses)
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: string
          required: true
        - name: clinical-status
          in: query
          type: string
        - name: category
          in: query
          type: string
          description: problem-list-item or encounter-diagnosis
    authentication:
      type: bearer
      token: '{{env.MEDITECH_API_KEY}}'
  exposes:
  - type: rest
    namespace: fhir-condition-rest
    port: 8080
    description: REST adapter for Meditech Expanse FHIR R4 API — Condition. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/patient/{id}/condition
      name: patient-id-condition
      description: REST surface for Patient-id-Condition.
      operations:
      - method: GET
        name: getpatientconditions
        description: Get patient conditions (problem list, diagnoses)
        call: fhir-condition.getpatientconditions
        with:
          id: rest.id
          clinical-status: rest.clinical-status
          category: rest.category
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: fhir-condition-mcp
    port: 9090
    transport: http
    description: MCP adapter for Meditech Expanse FHIR R4 API — Condition. One tool per consumed operation, routed inline
      through this capability's consumes block.
    tools:
    - name: get-patient-conditions-problem-list
      description: Get patient conditions (problem list, diagnoses)
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: fhir-condition.getpatientconditions
      with:
        id: tools.id
        clinical-status: tools.clinical-status
        category: tools.category
      outputParameters:
      - type: object
        mapping: $.
