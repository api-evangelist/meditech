naftiko: 1.0.0-alpha2
info:
  label: Meditech Expanse FHIR R4 API — Diagnostic
  description: 'Meditech Expanse FHIR R4 API — Diagnostic. 1 operations. Lead operation: Get patient diagnostic reports. Self-contained
    Naftiko capability covering one Meditech business surface.'
  tags:
  - Meditech
  - Diagnostic
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    MEDITECH_API_KEY: MEDITECH_API_KEY
capability:
  consumes:
  - type: http
    namespace: fhir-diagnostic
    baseUri: https://{facility}.meditech.com/fhir/r4
    description: Meditech Expanse FHIR R4 API — Diagnostic business capability. Self-contained, no shared references.
    resources:
    - name: Patient-id-DiagnosticReport
      path: /Patient/{id}/DiagnosticReport
      operations:
      - name: getpatientdiagnosticreports
        method: GET
        description: Get patient diagnostic reports
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: string
          required: true
        - name: category
          in: query
          type: string
          description: LAB, RAD, etc.
        - name: date
          in: query
          type: string
    authentication:
      type: bearer
      token: '{{env.MEDITECH_API_KEY}}'
  exposes:
  - type: rest
    namespace: fhir-diagnostic-rest
    port: 8080
    description: REST adapter for Meditech Expanse FHIR R4 API — Diagnostic. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/patient/{id}/diagnosticreport
      name: patient-id-diagnosticreport
      description: REST surface for Patient-id-DiagnosticReport.
      operations:
      - method: GET
        name: getpatientdiagnosticreports
        description: Get patient diagnostic reports
        call: fhir-diagnostic.getpatientdiagnosticreports
        with:
          id: rest.id
          category: rest.category
          date: rest.date
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: fhir-diagnostic-mcp
    port: 9090
    transport: http
    description: MCP adapter for Meditech Expanse FHIR R4 API — Diagnostic. One tool per consumed operation, routed inline
      through this capability's consumes block.
    tools:
    - name: get-patient-diagnostic-reports
      description: Get patient diagnostic reports
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: fhir-diagnostic.getpatientdiagnosticreports
      with:
        id: tools.id
        category: tools.category
        date: tools.date
      outputParameters:
      - type: object
        mapping: $.
